services:
  db:
    image: postgres:16
    container_name: solicitud_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: SolicitudServidoresDB
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./Back
      dockerfile: Dockerfile
    container_name: solicitud_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DATABASE_PROVIDER: "postgres"
      POSTGRESQL_CONNECTION: "Host=db;Port=5432;Username=postgres;Password=1234;Database=SolicitudServidoresDB"
      # Variables de API externas — completar con los valores reales
      APID_USER: "placeholder"
      APID_URL: "http://placeholder"
      APIC_KEY: "placeholder"
      APIC_URL: "http://placeholder"
      JWT__key: "ReplaceWithSecureSecretKeyChangeInProduction"

  tests:
    build:
      context: ./Back
      dockerfile: Dockerfile
      target: test          # apunta al stage "test", no al runtime
    container_name: solicitud_tests
    profiles:
      - test                # solo se ejecuta con --profile test

volumes:
  postgres_data:
